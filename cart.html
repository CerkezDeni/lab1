<!DOCTYPE html>

<head>
    <title>Kosarica</title>
    <link rel="stylesheet" href="/styles/cart.css" />
    <script src="/scripts/cart.js" defer></script>
</head>

<body>
    <div class="page">
        <div class="zaglavlje">
            <div class="logotip">LOGOTIP</div>
            <div class="trenutna-kategorija">(trenutno otvorena)</div>
            <div class="header-icons">
                <div class="kosara"><a href="cart.html">🛒</a></div>
                <div class="pretrazi">🔍</div>
            </div>
        </div>
        <div class="kosarica">
            <div class="naslov">KOŠARICA</div>
            <button id="addBtn"> DODAJ ELEMENT proba</button>
            <div class="cart-box">
                <table>
                    <thead>
                        <tr>
                            <th>NAZIV PROIZVODA</th>
                            <th>KOLIČINA</th>
                        </tr>
                    </thead>

                    <tbody id="cartBody">
                        <tr id="elementKosarice">
                            <td>Proizvod 1</td>
                            <td class="kolicina">
                                <button class="minus">-</button>
                                <span class="counter">1</span>
                                <button class="plus">+</button>
                            </td>
                        </tr>

                        <tr id="elementKosarice">
                            <td>Proizvod 2</td>
                            <td class="kolicina">
                                <button class="minus">-</button>
                                <span class="counter">1</span>
                                <button class="plus">+</button>
                            </td>
                        </tr>

                        <tr id="elementKosarice">
                            <td>Proizvod 3</td>
                            <td class="kolicina">
                                <button class="minus">-</button>
                                <span class="counter">1</span>
                                <button class="plus">+</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>


</body>

</html>
